# ============================================================
# Fluentd Configuration
# Pipeline: source -> filter -> match
# ============================================================

# ------------------------------------------------------------
# SOURCE: Terima log dari Docker Logging Driver (forward input)
# Docker daemon mengirim log ke port 24224
# ------------------------------------------------------------
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# ------------------------------------------------------------
# FILTER: Tambahkan field ke setiap log dari nginx
# record_transformer digunakan untuk enrich / transform log
# ------------------------------------------------------------
<filter nginx.**>
  @type record_transformer
  <record>
    service  nginx
    env      development
  </record>
</filter>

# ------------------------------------------------------------
# MATCH: Output log ke stdout DAN file
# Tag "nginx.**" cocok dengan tag yang dikirim nginx
# ------------------------------------------------------------
<match nginx.**>
  @type copy

  # Output 1: tampilkan di console fluentd (docker logs fluentd)
  <store>
    @type stdout
  </store>

  # Output 2: simpan ke file dalam volume fluentd_logs
  <store>
    @type file
    path /fluentd/log/nginx
    append true
    <format>
      @type json
    </format>
    <buffer>
      flush_interval 5s
    </buffer>
  </store>
</match>
