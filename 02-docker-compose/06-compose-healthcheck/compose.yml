services:
  flask-api:
    build: .
    container_name: flask-health-api

    ports:
      - "5000:5000"

    restart: always

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health-error').read()"
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s