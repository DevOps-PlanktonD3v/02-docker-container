services:
  secure-nginx:
    build: .
    container_name: secure-nginx
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp/nginx:uid=1001,gid=1001,mode=1777
      - /var/run
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    userns_mode: default