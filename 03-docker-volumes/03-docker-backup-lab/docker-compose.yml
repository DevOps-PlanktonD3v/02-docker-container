services:
  upload-app-1:
    build: .
    container_name: upload-app-1
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      UPLOAD_FOLDER: /shared/uploads
    volumes:
      - shared-data:/shared/uploads

  upload-app-2:
    build: .
    container_name: upload-app-2
    ports:
      - "5002:5000"
    environment:
      PORT: 5000
      UPLOAD_FOLDER: /shared/uploads
    volumes:
      - shared-data:/shared/uploads

  postgres:
    image: postgres:17-alpine
    container_name: postgres-backup
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backupdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  shared-data:
  postgres-data: